<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#030d14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Water AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary:        #00b4d8;
      --primary-deep:   #0077b6;
      --surface-dark:   #030d14;
      --surface-mid:    #050f1e;
      --surface-elev:   #071f32;
      --sidebar-bg:     #040c18;
      --chat-bg:        #040f1c;
      --msg-ai-bg:      rgba(0,180,216,0.07);
      --msg-ai-border:  rgba(0,180,216,0.2);
      --msg-user-bg:    rgba(0,119,182,0.22);
      --msg-user-border:rgba(0,180,216,0.38);
      --border:         rgba(0,180,216,0.15);
      --text-primary:   #e8f4f8;
      --text-secondary: #6da8c2;
      --input-bg:       #071f32;
      --placeholder:    #3a6c82;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'Outfit', sans-serif;
      line-height: 1.6;
      background: var(--surface-dark);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
      padding-top: env(safe-area-inset-top, 0px);
    }

    /* water glow */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 85%, rgba(0,119,182,0.16) 0%, transparent 70%),
        radial-gradient(ellipse 50% 35% at 80% 15%, rgba(0,180,216,0.1)  0%, transparent 70%);
      pointer-events: none; z-index: 0;
      animation: waterShift 14s ease-in-out infinite alternate;
    }
    @keyframes waterShift {
      0%   { opacity:.7; transform:scale(1); }
      100% { opacity:1;  transform:scale(1.05) translateY(-8px); }
    }

    .bubbles { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
    .bubble {
      position:absolute; bottom:-60px; border-radius:50%;
      background:rgba(0,180,216,0.05); border:1px solid rgba(0,180,216,0.13);
      animation:rise linear infinite;
    }
    .bubble:nth-child(1){width:15px;height:15px;left:7%;  animation-duration:15s;animation-delay:0s;}
    .bubble:nth-child(2){width:9px; height:9px; left:24%; animation-duration:19s;animation-delay:3s;}
    .bubble:nth-child(3){width:21px;height:21px;left:41%; animation-duration:13s;animation-delay:1s;}
    .bubble:nth-child(4){width:7px; height:7px; left:58%; animation-duration:21s;animation-delay:5s;}
    .bubble:nth-child(5){width:12px;height:12px;left:73%; animation-duration:17s;animation-delay:2s;}
    .bubble:nth-child(6){width:19px;height:19px;left:88%; animation-duration:12s;animation-delay:7s;}
    @keyframes rise {
      0%  {transform:translateY(0) scale(1);opacity:0;}
      10% {opacity:1;}
      90% {opacity:.5;}
      100%{transform:translateY(-110vh) translateX(14px) scale(1.1);opacity:0;}
    }

    /* ══════════════════════════════
       APP SHELL — sidebar + main
    ══════════════════════════════ */
    .app-shell {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 260px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform 0.28s cubic-bezier(.4,0,.2,1);
      z-index: 10;
    }

    /* mobile: sidebar hidden by default, slides in */
    @media (max-width: 639px) {
      .sidebar {
        position: fixed;
        top: 0; left: 0; bottom: 0;
        transform: translateX(-100%);
        padding-top: env(safe-area-inset-top, 0px);
      }
      .sidebar.open { transform: translateX(0); box-shadow: 4px 0 24px rgba(0,0,0,0.6); }
      .sidebar-backdrop { display: block; }
    }

    /* sidebar backdrop (mobile only) */
    .sidebar-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 9;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .sidebar-backdrop.visible { opacity: 1; pointer-events: auto; }

    .sidebar-header {
      padding: 16px 14px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-logo { width: 22px; height: 22px; flex-shrink: 0; }
    .sidebar-logo svg { width: 22px; height: 22px; }
    .sidebar-title {
      font-size: 1rem; font-weight: 600;
      background: linear-gradient(135deg, #90e0ef 0%, #00b4d8 55%, #0077b6 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .btn-new-chat {
      margin: 12px 10px 8px;
      padding: 10px 14px;
      background: rgba(0,180,216,0.1);
      border: 1px solid rgba(0,180,216,0.25);
      border-radius: 12px;
      color: var(--primary);
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn-new-chat:hover { background: rgba(0,180,216,0.18); border-color: rgba(0,180,216,0.4); }
    .btn-new-chat svg { width: 16px; height: 16px; flex-shrink: 0; }

    .sidebar-section-label {
      padding: 8px 14px 4px;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--placeholder);
      text-transform: uppercase;
    }

    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px;
      -webkit-overflow-scrolling: touch;
    }
    .chat-list::-webkit-scrollbar { width: 3px; }
    .chat-list::-webkit-scrollbar-thumb { background: rgba(0,180,216,0.18); border-radius: 4px; }

    .chat-list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.88rem;
      color: var(--text-secondary);
      transition: background 0.12s, color 0.12s;
      gap: 6px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .chat-list-item:hover { background: rgba(0,180,216,0.07); color: var(--text-primary); }
    .chat-list-item.active { background: rgba(0,180,216,0.13); color: var(--text-primary); }
    .chat-list-item .item-title {
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .chat-list-item .item-del {
      flex-shrink: 0; width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px; opacity: 0;
      transition: opacity 0.12s, background 0.12s;
      color: #e05a5a;
    }
    .chat-list-item:hover .item-del { opacity: 1; }
    .chat-list-item .item-del:hover { background: rgba(224,90,90,0.15); }
    .chat-list-item .item-del svg { width: 12px; height: 12px; }

    .sidebar-empty {
      padding: 16px 14px;
      font-size: 0.82rem;
      color: var(--placeholder);
      font-style: italic;
    }

    /* ── MAIN PANEL ── */
    .main-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 14px 11px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: transparent;
      position: relative; z-index: 1;
    }

    /* hamburger — mobile only */
    .btn-menu {
      display: none;
      width: 38px; height: 38px;
      background: rgba(0,180,216,0.08);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--primary);
      align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn-menu svg { width: 18px; height: 18px; }
    @media (max-width: 639px) { .btn-menu { display: flex; } }

    .header-center { display: flex; align-items: center; gap: 8px; flex: 1; justify-content: center; }
    .logo-drop { width: 26px; height: 26px; flex-shrink: 0; }
    .logo-drop svg { width: 26px; height: 26px; }
    h1 {
      font-size: 1.15rem; font-weight: 600; letter-spacing: -0.02em;
      background: linear-gradient(135deg, #90e0ef 0%, #00b4d8 55%, #0077b6 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    /* desktop header new-chat button */
    .btn-new-chat-header {
      display: none;
      width: 38px; height: 38px;
      background: rgba(0,180,216,0.08);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--primary);
      align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-new-chat-header svg { width: 18px; height: 18px; }
    .btn-new-chat-header:hover { background: rgba(0,180,216,0.16); }
    @media (max-width: 639px) { .btn-new-chat-header { display: flex; } }

    /* ── CHAT MESSAGES ── */
    .chat-container {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
      background: var(--chat-bg); position: relative; z-index: 1;
    }

    .chat-messages {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain; padding: 14px 12px 8px;
      scroll-behavior: smooth; display: flex; flex-direction: column;
    }
    .chat-messages::-webkit-scrollbar { width: 3px; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(0,180,216,0.2); border-radius: 10px; }

    .message {
      margin-bottom: 10px; padding: 11px 14px; border-radius: 18px;
      max-width: 82%; word-wrap: break-word; line-height: 1.55;
      font-size: 0.95rem; animation: fadeUp 0.22s ease forwards; opacity: 0;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(6px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .message p { white-space: pre-line; margin: 0; overflow-wrap: anywhere; }

    .user-message {
      background: var(--msg-user-bg); border: 1px solid var(--msg-user-border);
      align-self: flex-end; margin-left: auto;
      border-bottom-right-radius: 5px; color: #d4eef8;
    }
    .assistant-message {
      background: var(--msg-ai-bg); border: 1px solid var(--msg-ai-border);
      align-self: flex-start; border-bottom-left-radius: 5px;
      color: var(--text-primary);
    }

    /* ── TYPING ── */
    .typing-indicator {
      display: none; padding: 10px 16px; color: var(--text-secondary);
      font-size: 0.85rem; background: var(--surface-elev);
      border-top: 1px solid var(--border);
      align-items: center; gap: 8px; flex-shrink: 0;
    }
    .typing-indicator.visible { display: flex; }
    .wave-dots { display: flex; gap: 4px; }
    .wave-dots span {
      display:block; width:6px; height:6px; border-radius:50%;
      background: var(--primary); animation: waveDot 1.3s ease-in-out infinite;
    }
    .wave-dots span:nth-child(2){animation-delay:.15s;}
    .wave-dots span:nth-child(3){animation-delay:.3s;}
    @keyframes waveDot {
      0%,80%,100%{transform:translateY(0);opacity:.4;}
      40%{transform:translateY(-5px);opacity:1;}
    }

    /* ── INPUT ── */
    .message-input {
      display: flex; padding: 10px 12px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
      border-top: 1px solid var(--border);
      background: var(--surface-elev); gap: 8px;
      align-items: flex-end; flex-shrink: 0;
    }
    #user-input {
      flex: 1; padding: 12px 16px; background: var(--input-bg);
      border: 1px solid rgba(0,180,216,0.2); border-radius: 22px;
      font-family: 'Outfit', sans-serif; font-size: 16px;
      color: var(--text-primary); resize: none;
      min-height: 48px; max-height: 130px;
      transition: border-color .2s, box-shadow .2s;
      line-height: 1.4; -webkit-appearance: none;
    }
    #user-input:focus {
      outline: none; border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0,180,216,0.12);
    }
    #user-input::placeholder { color: var(--placeholder); }

    #send-button {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--primary-deep), var(--primary));
      border: none; border-radius: 50%; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .15s, transform .1s, box-shadow .15s;
      box-shadow: 0 2px 14px rgba(0,180,216,0.35);
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    #send-button svg { width: 18px; height: 18px; }
    #send-button:hover  { box-shadow: 0 4px 20px rgba(0,180,216,0.5); transform: scale(1.06); }
    #send-button:active { transform: scale(0.94); }
    #send-button:disabled {
      background: linear-gradient(135deg, #1a3a4a, #1d4f62);
      opacity: .45; cursor: not-allowed; box-shadow: none; transform: none;
    }

    /* ── DESKTOP overrides ── */
    @media (min-width: 640px) {
      body { max-width: 1100px; margin: 0 auto; }
      .chat-container {
        border-left: 1px solid var(--border);
      }
      .message-input { padding-bottom: 10px; }
    }

    a { color: var(--primary); text-decoration: none; }
  </style>
</head>
<body>

<div class="bubbles">
  <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
  <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
</div>

<!-- Sidebar backdrop (mobile) -->
<div class="sidebar-backdrop" id="sidebar-backdrop"></div>

<div class="app-shell">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <svg viewBox="0 0 38 38" fill="none">
          <defs>
            <linearGradient id="dg2" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#90e0ef"/>
              <stop offset="100%" stop-color="#0077b6"/>
            </linearGradient>
          </defs>
          <path d="M19 4C19 4 8 17 8 24c0 6.627 5 12 11 12s11-5.373 11-12C30 17 19 4 19 4z" fill="url(#dg2)" opacity="0.92"/>
        </svg>
      </div>
      <span class="sidebar-title">Water AI</span>
    </div>

    <button class="btn-new-chat" id="btn-new-chat-sidebar">
      <svg viewBox="0 0 20 20" fill="none">
        <path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Nowy czat
    </button>

    <div class="sidebar-section-label">Historia</div>
    <div class="chat-list" id="chat-list">
      <div class="sidebar-empty" id="sidebar-empty">Brak zapisanych czatów</div>
    </div>
  </aside>

  <!-- ── MAIN PANEL ── -->
  <div class="main-panel">
    <header>
      <!-- hamburger (mobile) -->
      <button class="btn-menu" id="btn-menu" aria-label="Menu">
        <svg viewBox="0 0 20 20" fill="none">
          <path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>

      <div class="header-center">
        <div class="logo-drop">
          <svg viewBox="0 0 38 38" fill="none">
            <defs>
              <linearGradient id="dg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#90e0ef"/>
                <stop offset="100%" stop-color="#0077b6"/>
              </linearGradient>
            </defs>
            <path d="M19 4C19 4 8 17 8 24c0 6.627 5 12 11 12s11-5.373 11-12C30 17 19 4 19 4z" fill="url(#dg)" opacity="0.92"/>
            <ellipse cx="15" cy="22" rx="3" ry="5" fill="white" opacity="0.16" transform="rotate(-20 15 22)"/>
          </svg>
        </div>
        <h1>Water AI</h1>
      </div>

      <!-- new chat btn (mobile, right side) -->
      <button class="btn-new-chat-header" id="btn-new-chat-header" aria-label="Nowy czat">
        <svg viewBox="0 0 20 20" fill="none">
          <path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </header>

    <div class="chat-container">
      <div id="chat-messages" class="chat-messages">
        <div class="message assistant-message">
          <p>Cześć! Jestem asystentem AI. W czym mogę Ci dziś pomóc?</p>
        </div>
      </div>

      <div class="typing-indicator" id="typing-indicator">
        <div class="wave-dots"><span></span><span></span><span></span></div>
        AI is thinking...
      </div>

      <div class="message-input">
        <textarea id="user-input" placeholder="Message Water AI..." rows="1" autofocus></textarea>
        <button id="send-button" aria-label="Send">
          <svg viewBox="0 0 20 20" fill="none">
            <path d="M17 10L3 3l3.5 7L3 17z" fill="white"/>
          </svg>
        </button>
      </div>
    </div>
  </div><!-- /main-panel -->

</div><!-- /app-shell -->

<script src="chat.js"></script>
</body>
</html>
