<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Water AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary:       #00b4d8;
      --primary-deep:  #0077b6;
      --primary-glow:  #90e0ef;
      --accent:        #caf0f8;
      --surface-dark:  #030d14;
      --surface-mid:   #051827;
      --surface-elev:  #071f32;
      --chat-bg:       #040f1c;
      --msg-ai-bg:     rgba(0,180,216,0.07);
      --msg-ai-border: rgba(0,180,216,0.2);
      --msg-user-bg:   rgba(0,119,182,0.18);
      --msg-user-border:rgba(0,180,216,0.35);
      --border:        rgba(0,180,216,0.15);
      --text-primary:  #e8f4f8;
      --text-secondary:#6da8c2;
      --input-bg:      #071f32;
      --placeholder:   #3a6c82;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      line-height: 1.6;
      background-color: var(--surface-dark);
      color: var(--text-primary);
      max-width: 800px;
      margin: 0 auto;
      padding: 1rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    /* ── Animated water background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 80%, rgba(0,119,182,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 35% at 80% 20%, rgba(0,180,216,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 80% 60% at 50% 110%, rgba(0,180,216,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
      animation: waterShift 12s ease-in-out infinite alternate;
    }

    @keyframes waterShift {
      0%   { opacity: 0.7; transform: scale(1) translateY(0); }
      100% { opacity: 1;   transform: scale(1.04) translateY(-10px); }
    }

    /* floating bubbles */
    .bubbles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .bubble {
      position: absolute;
      bottom: -60px;
      border-radius: 50%;
      background: rgba(0,180,216,0.06);
      border: 1px solid rgba(0,180,216,0.15);
      animation: rise linear infinite;
    }
    .bubble:nth-child(1)  { width:18px; height:18px; left:8%;  animation-duration:14s; animation-delay:0s; }
    .bubble:nth-child(2)  { width:10px; height:10px; left:22%; animation-duration:18s; animation-delay:3s; }
    .bubble:nth-child(3)  { width:26px; height:26px; left:38%; animation-duration:12s; animation-delay:1s; }
    .bubble:nth-child(4)  { width:8px;  height:8px;  left:55%; animation-duration:20s; animation-delay:5s; }
    .bubble:nth-child(5)  { width:14px; height:14px; left:70%; animation-duration:16s; animation-delay:2s; }
    .bubble:nth-child(6)  { width:22px; height:22px; left:85%; animation-duration:11s; animation-delay:7s; }
    .bubble:nth-child(7)  { width:6px;  height:6px;  left:48%; animation-duration:22s; animation-delay:9s; }

    @keyframes rise {
      0%   { transform: translateY(0) translateX(0)   scale(1);   opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-110vh) translateX(20px) scale(1.2); opacity: 0; }
    }

    /* ── All real content above bg ── */
    header, .chat-container, footer { position: relative; z-index: 1; }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 1.5rem;
      padding: 1.2rem 0 1rem;
      border-bottom: 1px solid var(--border);
    }

    .logo-wrap {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 4px;
    }

    .logo-drop {
      width: 38px; height: 38px;
      position: relative;
    }
    .logo-drop svg { width: 38px; height: 38px; }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #90e0ef 0%, #00b4d8 50%, #0077b6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--text-secondary);
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    /* ── Chat container ── */
    .chat-container {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 190px);
      min-height: 450px;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      background-color: var(--chat-bg);
      box-shadow:
        0 0 0 1px rgba(0,180,216,0.08),
        0 8px 32px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(0,180,216,0.1);
    }

    /* ── Messages ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 1.2rem;
      background: transparent;
      scroll-behavior: smooth;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb {
      background: rgba(0,180,216,0.25);
      border-radius: 10px;
    }

    .message {
      margin-bottom: 1rem;
      padding: 0.85rem 1.1rem;
      border-radius: 14px;
      max-width: 84%;
      word-wrap: break-word;
      line-height: 1.6;
      font-size: 0.95rem;
      animation: fadeUp 0.25s ease forwards;
      opacity: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message p { white-space: pre-line; margin: 0; overflow-wrap: anywhere; }

    .user-message {
      background: var(--msg-user-bg);
      border: 1px solid var(--msg-user-border);
      align-self: flex-end;
      margin-left: auto;
      border-bottom-right-radius: 4px;
      color: #d4eef8;
      backdrop-filter: blur(4px);
    }

    .assistant-message {
      background: var(--msg-ai-bg);
      border: 1px solid var(--msg-ai-border);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      color: var(--text-primary);
      backdrop-filter: blur(4px);
      position: relative;
    }

    /* AI label */
    .assistant-message::before {
      content: 'WATER AI';
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      color: var(--primary);
      margin-bottom: 5px;
      opacity: 0.7;
    }

    /* ── Typing indicator ── */
    .typing-indicator {
      display: none;
      padding: 0.7rem 1.2rem;
      color: var(--text-secondary);
      font-size: 0.85rem;
      background: var(--surface-elev);
      border-top: 1px solid var(--border);
      align-items: center;
      gap: 8px;
    }

    .typing-indicator.visible { display: flex; }

    .wave-dots {
      display: flex;
      gap: 4px;
    }
    .wave-dots span {
      display: block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--primary);
      animation: waveDot 1.3s ease-in-out infinite;
    }
    .wave-dots span:nth-child(2) { animation-delay: 0.15s; }
    .wave-dots span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes waveDot {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%            { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Input area ── */
    .message-input {
      display: flex;
      padding: 0.9rem 1rem;
      border-top: 1px solid var(--border);
      background: var(--surface-elev);
      gap: 0.7rem;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      padding: 0.75rem 1.1rem;
      background: var(--input-bg);
      border: 1px solid rgba(0,180,216,0.2);
      border-radius: 24px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      color: var(--text-primary);
      resize: none;
      min-height: 48px;
      max-height: 160px;
      transition: border-color 0.2s, box-shadow 0.2s;
      line-height: 1.5;
    }

    #user-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0,180,216,0.12), inset 0 1px 0 rgba(0,180,216,0.05);
    }

    #user-input::placeholder { color: var(--placeholder); }

    #send-button {
      padding: 0 1.4rem;
      height: 48px;
      background: linear-gradient(135deg, var(--primary-deep), var(--primary));
      color: white;
      border: none;
      border-radius: 24px;
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 2px 12px rgba(0,180,216,0.3);
      white-space: nowrap;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    #send-button:hover {
      opacity: 0.9;
      box-shadow: 0 4px 20px rgba(0,180,216,0.45);
      transform: translateY(-1px);
    }

    #send-button:active { transform: translateY(0); }

    #send-button:disabled {
      background: linear-gradient(135deg, #1a3a4a, #1d4f62);
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    /* send icon */
    #send-button svg { width: 15px; height: 15px; flex-shrink: 0; }

    /* ── Footer ── */
    footer {
      margin-top: 1.2rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-secondary);
      opacity: 0.6;
      letter-spacing: 0.03em;
    }

    a { color: var(--primary); text-decoration: none; }
    a:hover { color: var(--primary-glow); }
  </style>
</head>
<body>

<div class="bubbles">
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
</div>

<header>
  <div class="logo-wrap">
    <div class="logo-drop">
      <!-- water drop SVG -->
      <svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="dropGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#90e0ef"/>
            <stop offset="100%" stop-color="#0077b6"/>
          </linearGradient>
        </defs>
        <path d="M19 4 C19 4 8 17 8 24 C8 30.627 13 36 19 36 C25 36 30 30.627 30 24 C30 17 19 4 19 4Z" fill="url(#dropGrad)" opacity="0.9"/>
        <ellipse cx="15" cy="22" rx="3" ry="5" fill="white" opacity="0.18" transform="rotate(-20 15 22)"/>
      </svg>
    </div>
    <h1>Water AI</h1>
  </div>
  <p>Cloudflare Workers AI · Powered by deep currents</p>
</header>

<div class="chat-container">
  <div id="chat-messages" class="chat-messages">
    <div class="message assistant-message">
      <p>Cześć! Jestem asystentem AI. W czym mogę Ci dziś pomóc?</p>
    </div>
  </div>

  <div class="typing-indicator" id="typing-indicator">
    <div class="wave-dots">
      <span></span><span></span><span></span>
    </div>
    AI is thinking...
  </div>

  <div class="message-input">
    <textarea
      id="user-input"
      placeholder="Message Water AI..."
      rows="1"
      autofocus
    ></textarea>
    <button id="send-button">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 8L2 2l3 6-3 6z" fill="white"/>
      </svg>
      Send
    </button>
  </div>
</div>

<footer>
  <p>© 2026 Water AI</p>
</footer>

<script src="chat.js"></script>
</body>
</html>
