<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#030d14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Water AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary:        #00b4d8;
      --primary-deep:   #0077b6;
      --primary-glow:   #90e0ef;
      --surface-dark:   #030d14;
      --surface-elev:   #071f32;
      --chat-bg:        #040f1c;
      --msg-ai-bg:      rgba(0,180,216,0.07);
      --msg-ai-border:  rgba(0,180,216,0.2);
      --msg-user-bg:    rgba(0,119,182,0.22);
      --msg-user-border:rgba(0,180,216,0.38);
      --border:         rgba(0,180,216,0.15);
      --text-primary:   #e8f4f8;
      --text-secondary: #6da8c2;
      --input-bg:       #071f32;
      --placeholder:    #3a6c82;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    body {
      font-family: 'Outfit', sans-serif;
      line-height: 1.6;
      background: var(--surface-dark);
      color: var(--text-primary);
      height: 100%;
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      padding-top: env(safe-area-inset-top, 0px);
    }

    /* water glow bg */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 85%, rgba(0,119,182,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 35% at 80% 15%, rgba(0,180,216,0.11) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
      animation: waterShift 14s ease-in-out infinite alternate;
    }
    @keyframes waterShift {
      0%   { opacity: 0.7; transform: scale(1); }
      100% { opacity: 1;   transform: scale(1.05) translateY(-8px); }
    }

    /* bubbles */
    .bubbles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .bubble {
      position: absolute; bottom: -60px; border-radius: 50%;
      background: rgba(0,180,216,0.05);
      border: 1px solid rgba(0,180,216,0.14);
      animation: rise linear infinite;
    }
    .bubble:nth-child(1) { width:16px;height:16px;left:7%;  animation-duration:15s;animation-delay:0s; }
    .bubble:nth-child(2) { width:9px; height:9px; left:23%; animation-duration:19s;animation-delay:3s; }
    .bubble:nth-child(3) { width:22px;height:22px;left:40%; animation-duration:13s;animation-delay:1s; }
    .bubble:nth-child(4) { width:7px; height:7px; left:57%; animation-duration:21s;animation-delay:5s; }
    .bubble:nth-child(5) { width:13px;height:13px;left:72%; animation-duration:17s;animation-delay:2s; }
    .bubble:nth-child(6) { width:20px;height:20px;left:87%; animation-duration:12s;animation-delay:7s; }
    @keyframes rise {
      0%   { transform:translateY(0) translateX(0) scale(1); opacity:0; }
      10%  { opacity:1; }
      90%  { opacity:0.5; }
      100% { transform:translateY(-110vh) translateX(16px) scale(1.15); opacity:0; }
    }

    header, .chat-container, footer { position: relative; z-index: 1; }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo-drop { width: 28px; height: 28px; flex-shrink: 0; }
    .logo-drop svg { width: 28px; height: 28px; }
    h1 {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #90e0ef 0%, #00b4d8 55%, #0077b6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── CHAT CONTAINER ── */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--chat-bg);
    }

    /* ── MESSAGES ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 14px 12px 8px;
      scroll-behavior: smooth;
      display: flex;
      flex-direction: column;
    }
    .chat-messages::-webkit-scrollbar { width: 3px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(0,180,216,0.2); border-radius: 10px; }

    .message {
      margin-bottom: 10px;
      padding: 11px 14px;
      border-radius: 18px;
      max-width: 82%;
      word-wrap: break-word;
      line-height: 1.55;
      font-size: 0.95rem;
      animation: fadeUp 0.22s ease forwards;
      opacity: 0;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(6px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .message p { white-space: pre-line; margin: 0; overflow-wrap: anywhere; }

    .user-message {
      background: var(--msg-user-bg);
      border: 1px solid var(--msg-user-border);
      align-self: flex-end;
      margin-left: auto;
      border-bottom-right-radius: 5px;
      color: #d4eef8;
    }
    .assistant-message {
      background: var(--msg-ai-bg);
      border: 1px solid var(--msg-ai-border);
      align-self: flex-start;
      border-bottom-left-radius: 5px;
      color: var(--text-primary);
    }

    /* ── TYPING ── */
    .typing-indicator {
      display: none;
      padding: 10px 16px;
      color: var(--text-secondary);
      font-size: 0.85rem;
      background: var(--surface-elev);
      border-top: 1px solid var(--border);
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .typing-indicator.visible { display: flex; }
    .wave-dots { display: flex; gap: 4px; }
    .wave-dots span {
      display: block; width: 6px; height: 6px; border-radius: 50%;
      background: var(--primary);
      animation: waveDot 1.3s ease-in-out infinite;
    }
    .wave-dots span:nth-child(2) { animation-delay: 0.15s; }
    .wave-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes waveDot {
      0%,80%,100% { transform:translateY(0); opacity:0.4; }
      40%          { transform:translateY(-5px); opacity:1; }
    }

    /* ── INPUT AREA ── */
    .message-input {
      display: flex;
      padding: 10px 12px;
      /* home bar safe area */
      padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
      border-top: 1px solid var(--border);
      background: var(--surface-elev);
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      padding: 12px 16px;
      background: var(--input-bg);
      border: 1px solid rgba(0,180,216,0.2);
      border-radius: 22px;
      font-family: 'Outfit', sans-serif;
      font-size: 16px; /* prevents iOS auto-zoom */
      color: var(--text-primary);
      resize: none;
      min-height: 48px;
      max-height: 130px;
      transition: border-color 0.2s, box-shadow 0.2s;
      line-height: 1.4;
      -webkit-appearance: none;
    }
    #user-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0,180,216,0.12);
    }
    #user-input::placeholder { color: var(--placeholder); }

    /* round send button — tap-friendly 48px */
    #send-button {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--primary-deep), var(--primary));
      color: white;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 2px 14px rgba(0,180,216,0.35);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    #send-button svg { width: 18px; height: 18px; }
    #send-button:hover  { box-shadow: 0 4px 20px rgba(0,180,216,0.5); transform: scale(1.06); }
    #send-button:active { transform: scale(0.94); }
    #send-button:disabled {
      background: linear-gradient(135deg, #1a3a4a, #1d4f62);
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    /* ── FOOTER — only desktop ── */
    footer {
      display: none;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-secondary);
      opacity: 0.5;
      padding: 10px 0;
      flex-shrink: 0;
    }

    /* ── DESKTOP overrides ── */
    @media (min-width: 520px) {
      body { padding: 1rem; overflow: visible; height: auto; min-height: 100vh; }
      .chat-container {
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
        height: calc(100vh - 150px);
        min-height: 450px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(0,180,216,0.1);
      }
      .message-input { padding-bottom: 10px; }
      footer { display: block; margin-top: 1rem; }
      h1 { font-size: 1.5rem; }
    }

    a { color: var(--primary); text-decoration: none; }
  </style>
</head>
<body>

<div class="bubbles">
  <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
  <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
</div>

<header>
  <div class="logo-drop">
    <svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="dg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#90e0ef"/>
          <stop offset="100%" stop-color="#0077b6"/>
        </linearGradient>
      </defs>
      <path d="M19 4C19 4 8 17 8 24c0 6.627 5 12 11 12s11-5.373 11-12C30 17 19 4 19 4z" fill="url(#dg)" opacity="0.92"/>
      <ellipse cx="15" cy="22" rx="3" ry="5" fill="white" opacity="0.16" transform="rotate(-20 15 22)"/>
    </svg>
  </div>
  <h1>Water AI</h1>
</header>

<div class="chat-container">
  <div id="chat-messages" class="chat-messages">
    <div class="message assistant-message">
      <p>Cześć! Jestem asystentem AI. W czym mogę Ci dziś pomóc?</p>
    </div>
  </div>

  <div class="typing-indicator" id="typing-indicator">
    <div class="wave-dots"><span></span><span></span><span></span></div>
    AI is thinking...
  </div>

  <div class="message-input">
    <textarea id="user-input" placeholder="Message Water AI..." rows="1" autofocus></textarea>
    <button id="send-button" aria-label="Send">
      <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M17 10L3 3l3.5 7L3 17z" fill="white"/>
      </svg>
    </button>
  </div>
</div>

<footer>
  <p>© 2026 Water AI</p>
</footer>

<script src="chat.js"></script>
</body>
</html>
